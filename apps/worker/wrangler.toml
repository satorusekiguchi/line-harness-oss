name = "line-crm-worker"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = true

# API_KEY is set via `wrangler secret put API_KEY`
# Do NOT hardcode secrets here

[vars]
WORKER_URL = "https://line-crm-worker.mumumuinc.workers.dev"

[[d1_databases]]
binding = "DB"
database_name = "line-crm"
database_id = "c1a90040-63d4-4636-80aa-e58c0d99deb3"

[triggers]
crons = ["*/5 * * * *"]
